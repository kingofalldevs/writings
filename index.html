<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ======= Viewport & Canonical ======= -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://www.crescendo.best/" />

    <!-- ======= Favicon & Icons ======= -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ======= Primary SEO ======= -->
    <title>Crescendo — Calm Space for Writing & Portfolio Publishing</title>
    <meta name="description" content="Crescendo is a calm, distraction-free writing tool with a built-in Ideabase, Binder, one-click portfolio publishing, and Aria AI — your intelligent writing assistant. Write more. Think deeper. Publish beautifully." />
    <meta name="keywords" content="writing app, research tool, ideabase, AI writing assistant, author portfolio, scholarly writing, note-taking, knowledge management, publish writing, zen writing, Crescendo" />
    <meta name="author" content="Crescendo" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="theme-color" content="#0a0a0f" />

    <!-- ======= Open Graph / Facebook / LinkedIn ======= -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Crescendo" />
    <meta property="og:url" content="https://www.crescendo.best/" />
    <meta property="og:title" content="Crescendo — Calm Space for Writing & Portfolio Publishing" />
    <meta property="og:description" content="A calm, distraction-free writing tool with a built-in Ideabase, Binder, one-click portfolio publishing, and Aria AI. Write more. Think deeper. Publish beautifully." />
    <meta property="og:image" content="https://www.crescendo.best/og-image.png" />
    <meta property="og:image:alt" content="Crescendo — Write. Think. Publish. The Living OS for Modern Scholars." />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ======= Twitter / X Cards ======= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@crescendobest" />
    <meta name="twitter:creator" content="@crescendobest" />
    <meta name="twitter:title" content="Crescendo — Calm Space for Writing & Portfolio Publishing" />
    <meta name="twitter:description" content="A calm, distraction-free writing tool with a built-in Ideabase, Binder, one-click portfolio publishing, and Aria AI. Write more. Think deeper. Publish beautifully." />
    <meta name="twitter:image" content="https://www.crescendo.best/og-image.png" />
    <meta name="twitter:image:alt" content="Crescendo — Write. Think. Publish." />

    <!-- ======= JSON-LD Structured Data (SoftwareApplication) ======= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Crescendo",
      "url": "https://www.crescendo.best/",
      "logo": "https://www.crescendo.best/favicon.svg",
      "image": "https://www.crescendo.best/og-image.png",
      "description": "Crescendo is a calm, distraction-free writing tool with a built-in Ideabase, Binder, one-click portfolio publishing, and Aria AI — your intelligent writing assistant.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Pro Monthly",
          "price": "9.99",
          "priceCurrency": "USD",
          "billingIncrement": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Pro Yearly",
          "price": "79.99",
          "priceCurrency": "USD",
          "billingIncrement": "P1Y"
        }
      ],
      "featureList": [
        "Ideabase — hierarchical idea & research organization",
        "Binder — structured chapter and manuscript management",
        "Aria AI — intelligent in-editor writing assistant",
        "One-click author portfolio publishing",
        "Distraction-free Zen writing editor",
        "Ambient focus soundscapes",
        "PDF upload & parsing"
      ],
      "sameAs": [
        "https://www.crescendo.best/"
      ]
    }
    </script>

    <!-- ======= JSON-LD: WebSite (enables Sitelinks Searchbox) ======= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Crescendo",
      "url": "https://www.crescendo.best/",
      "description": "The Living OS for Modern Scholars & Writers",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.crescendo.best/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ======= JSON-LD: Organization ======= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Crescendo",
      "url": "https://www.crescendo.best/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.crescendo.best/favicon.svg",
        "width": 512,
        "height": 512
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://www.crescendo.best/"
      }
    }
    </script>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
