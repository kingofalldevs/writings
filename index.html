<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="canonical" href="https://writings.page/" />

    <!-- Performance & Font Preloads -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto+Mono:wght@100..700&display=swap" rel="stylesheet">

    <!-- SEO Meta Tags -->
    <title>Writings — Calm Space for Writing & Portfolio Publishing</title>
    <meta name="description" content="Writings is a calm, distraction-free writing tool with a built-in Ideabase, Binder, one-click portfolio publishing, and Aria AI — your intelligent writing assistant. Write more. Think deeper. Publish beautifully." />
    <meta name="keywords" content="writing app, research tool, ideabase, AI writing assistant, author portfolio, scholarly writing, note-taking, knowledge management, publish writing, zen writing, Writings" />
    <meta name="author" content="Writings" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Writings" />
    <meta property="og:url" content="https://writings.page/" />
    <meta property="og:title" content="Writings — Calm Space for Writing & Portfolio Publishing" />
    <meta property="og:description" content="Calm, distraction-free writing tool with a built-in Ideabase, Binder, and one-click portfolio publishing." />
    <meta property="og:image" content="https://writings.page/og-image.png" />
    <meta property="og:image:alt" content="Writings — Write. Think. Publish. The Living OS for Modern Scholars." />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@writingspage" />
    <meta name="twitter:creator" content="@writingspage" />
    <meta name="twitter:title" content="Writings — Calm Space for Writing & Portfolio Publishing" />
    <meta name="twitter:description" content="Calm, distraction-free writing tool with a built-in Ideabase, Binder, and one-click portfolio publishing." />
    <meta name="twitter:image" content="https://writings.page/og-image.png" />
    <meta name="twitter:image:alt" content="Writings — Write. Think. Publish." />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Writings",
      "url": "https://writings.page/",
      "logo": "https://writings.page/favicon.svg",
      "image": "https://writings.page/og-image.png",
      "description": "Writings is a calm, distraction-free writing tool with a built-in Ideabase, Binder, one-click portfolio publishing, and Aria AI — your intelligent writing assistant.",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Zen (Free)",
          "price": "0",
          "priceCurrency": "USD"
        },
        {
          "@type": "Offer",
          "name": "Writings Pro Monthly",
          "price": "10.00",
          "priceCurrency": "USD",
          "billingIncrement": "P1M"
        },
        {
          "@type": "Offer",
          "name": "Writings Pro Yearly",
          "price": "100.00",
          "priceCurrency": "USD",
          "billingIncrement": "P1Y"
        }
      ],
      "featureList": [
        "Minimalist Living OS Editor",
        "Scrivener-style Binder",
        "Binaural Focus Tracks",
        "Aria AI Assistant",
        "PDF Research & Extraction",
        "Author Portfolio Publishing",
        "Custom Branding & Domains"
      ]
    }
    </script>

    <!-- ======= JSON-LD: WebSite (enables Sitelinks Searchbox) ======= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Writings",
      "url": "https://writings.page/",
      "description": "The Living OS for Modern Scholars & Writers",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://writings.page/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ======= JSON-LD: Organization ======= -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Writings",
      "url": "https://writings.page/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://writings.page/favicon.svg",
        "width": 512,
        "height": 512
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://writings.page/"
      }
    }
    </script>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
